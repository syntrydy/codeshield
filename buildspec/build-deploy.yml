# buildspec/build-deploy.yml
# Trigger: push to main (CodeBuild project: build-deploy)
# Builds the API Docker image, pushes to ECR, deploys to App Runner + Lambda.
# Builds the React frontend, syncs to S3, invalidates CloudFront cache.
#
# Required CodeBuild environment variables (set in the project, not here):
#   AWS_ACCOUNT_ID, AWS_REGION
#   ECR_REPO_API                   — ECR repo name for the API/Lambda image
#   APPRUNNER_SERVICE_ARN          — App Runner service ARN (from terraform output apprunner_service_id is the ID; ARN is arn:aws:apprunner:...)
#   LAMBDA_FUNCTION_NAME           — Lambda function name (from terraform output lambda_function_name)
#   FRONTEND_BUCKET                — S3 bucket name (from terraform output frontend_bucket)
#   CF_DIST_ID                     — CloudFront distribution ID (from terraform output cloudfront_distribution_id)
#   API_HEALTH_URL                 — base URL of the deployed App Runner service for smoke test
#   VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY
#   VITE_API_BASE_URL, VITE_GITHUB_APP_SLUG
version: 0.2

env:
  variables:
    IMAGE_TAG: $CODEBUILD_RESOLVED_SOURCE_VERSION

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - API_REPO=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_API

  build:
    commands:
      # ── API/Lambda Docker image ───────────────────────────────────────────────
      - echo "Building API image..."
      - docker build -t $API_REPO:$IMAGE_TAG -t $API_REPO:latest ./api

      # ── React frontend ────────────────────────────────────────────────────────
      - echo "Building frontend..."
      - cd web
      - npm ci
      - VITE_SUPABASE_URL=$VITE_SUPABASE_URL
        VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY
        VITE_API_BASE_URL=$VITE_API_BASE_URL
        VITE_GITHUB_APP_SLUG=$VITE_GITHUB_APP_SLUG
        npm run build
      - cd ..

  post_build:
    commands:
      # ── Push API image ────────────────────────────────────────────────────────
      - echo "Pushing API image to ECR..."
      - docker push $API_REPO:$IMAGE_TAG
      - docker push $API_REPO:latest

      # ── Update Lambda to the new image ────────────────────────────────────────
      - echo "Updating Lambda worker image..."
      - aws lambda update-function-code
          --function-name $LAMBDA_FUNCTION_NAME
          --image-uri $API_REPO:$IMAGE_TAG
          --region $AWS_REGION
      - aws lambda wait function-updated
          --function-name $LAMBDA_FUNCTION_NAME
          --region $AWS_REGION

      # ── Trigger App Runner deployment ─────────────────────────────────────────
      - echo "Triggering App Runner deployment..."
      - aws apprunner start-deployment
          --service-arn $APPRUNNER_SERVICE_ARN
          --region $AWS_REGION

      # ── Deploy frontend to S3 + CloudFront ────────────────────────────────────
      - echo "Syncing frontend assets to S3..."
      - aws s3 sync web/dist/assets/ s3://$FRONTEND_BUCKET/assets/
          --delete
          --cache-control "public,max-age=31536000,immutable"
          --region $AWS_REGION
      - aws s3 sync web/dist/ s3://$FRONTEND_BUCKET/
          --delete
          --exclude "assets/*"
          --cache-control "no-cache,no-store,must-revalidate"
          --region $AWS_REGION
      - echo "Invalidating CloudFront cache..."
      - aws cloudfront create-invalidation
          --distribution-id $CF_DIST_ID
          --paths "/*"

      # ── Smoke test (App Runner needs ~30s to route traffic) ───────────────────
      - echo "Waiting 30s for App Runner to route traffic..."
      - sleep 30
      - echo "Smoke test — health endpoint..."
      - curl --fail --retry 6 --retry-delay 10 $API_HEALTH_URL/health

      - echo "Deploy complete."

artifacts:
  files:
    - "**/*"
  base-directory: .
