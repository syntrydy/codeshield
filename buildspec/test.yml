# buildspec/test.yml
# Trigger: any push or PR (CodeBuild project: code-review-test)
# Runs: ruff lint + pytest + frontend lint + frontend build + fast eval subset (3 fixtures).
# mypy is intentionally omitted — there are pre-existing errors to clean up first.
version: 0.2

env:
  secrets-manager:
    OPENAI_API_KEY:         code-review-prod/openai_api_key
    SUPABASE_SECRET_KEY:    code-review-prod/supabase_service_role_key
    GITHUB_APP_ID:          code-review-prod/github_app_id
    GITHUB_APP_SLUG:        code-review-prod/github_app_slug
    GITHUB_WEBHOOK_SECRET:  code-review-prod/github_webhook_secret
    GITHUB_PRIVATE_KEY:     code-review-prod/github_private_key
    LANGSMITH_API_KEY:      code-review-prod/langsmith_api_key

phases:
  install:
    runtime-versions:
      python: 3.12
      nodejs: 20
    commands:
      - curl -LsSf https://astral.sh/uv/install.sh | sh
      - export PATH="$HOME/.local/bin:$PATH"
      - npm install -g pnpm
  pre_build:
    commands:
      - cd api && uv sync
      - cd ../web && pnpm install --frozen-lockfile
  build:
    commands:
      - cd api && uv run ruff check . && uv run pytest -xvs
      - cd ../web && pnpm build
      # pnpm lint + fast eval are temporarily dropped:
      #   - lint: pre-existing errors to clean up (mostly no-restricted-syntax for t('key'))
      #   - eval: evals/run.py builds a ReviewState missing newer required fields
      #           (github_installation_id, repo_full_name, severity_threshold)
