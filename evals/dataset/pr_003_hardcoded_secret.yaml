id: pr_003_hardcoded_secret
description: >
  PR that hardcodes a production API key as a module-level string literal.
  Ground truth for the Security specialist on secret exposure.

pr_url: https://github.com/codeshield-eval/fixtures/pull/3
pr_head_sha: "fixture-sha-003"
pr_base_sha: "fixture-sha-000"
locale: en
enabled_specialists: [security, correctness, performance, style]

changed_files:
  - path: integrations/weather.py
    content: |
      import requests

      API_KEY = "sk-prod-abc123XYZsecretkey9876"

      def fetch_weather(city: str) -> dict:
          url = f"https://api.weather.com/v1/current?city={city}&key={API_KEY}"
          response = requests.get(url)
          response.raise_for_status()
          return response.json()

expected_findings:
  - specialist: security
    file: integrations/weather.py
    line_range: [3, 3]
    description: >
      Hardcoded API key committed to source. Any repository reader — including
      CI workers, forks, and git history scrapers — can extract and misuse it.
      Secrets must be loaded from environment variables or a secrets manager.
    severity: critical

negative_findings:
  - description: >
      Flagging the f-string URL construction as an injection risk is a false positive —
      the API key is embedded in the URL, not user input.

expected_verdict: request_changes
