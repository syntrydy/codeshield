# buildspec/terraform.yml
# Trigger: push to main affecting infra/** (CodeBuild project: terraform)
# On PRs:   runs terraform plan and posts output as a CodeBuild report.
# On main:  runs terraform apply -auto-approve.
#
# Required CodeBuild environment variables:
#   TF_STATE_BUCKET, TF_STATE_KEY, TF_LOCK_TABLE, AWS_REGION
#   TF_VAR_* for all Terraform input variables
#
# CodeBuild service role needs: S3 (state bucket), DynamoDB (lock table),
# and all permissions Terraform will use (ECS, ECR, ElastiCache, ALB, IAM, etc.)
version: 0.2

env:
  variables:
    TF_VERSION: "1.9.5"
    TF_DIR: infra

phases:
  install:
    commands:
      - curl -sLo terraform.zip https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip
      - unzip -q terraform.zip -d /usr/local/bin
      - terraform version

  pre_build:
    commands:
      - cd $TF_DIR
      - terraform init
          -backend-config="bucket=$TF_STATE_BUCKET"
          -backend-config="key=$TF_STATE_KEY"
          -backend-config="region=$AWS_REGION"
          -backend-config="dynamodb_table=$TF_LOCK_TABLE"
          -input=false

  build:
    commands:
      - terraform validate
      - |
        if [ "$CODEBUILD_WEBHOOK_EVENT" = "PULL_REQUEST_CREATED" ] || [ "$CODEBUILD_WEBHOOK_EVENT" = "PULL_REQUEST_UPDATED" ]; then
          echo "PR build — running terraform plan only"
          terraform plan -input=false -out=tfplan
          terraform show -no-color tfplan > plan_output.txt
          cat plan_output.txt
        else
          echo "Main branch — running terraform apply"
          terraform apply -input=false -auto-approve
        fi

reports:
  TerraformPlan:
    files:
      - "$TF_DIR/plan_output.txt"
    discard-paths: yes
