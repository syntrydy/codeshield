services:
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./api/app:/app/app
      - ./secrets:/app/secrets:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm dev --host"
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      # Vite requires VITE_ prefix; these mirror the .env values at build time
      - VITE_SUPABASE_URL
      - VITE_SUPABASE_PUBLISHABLE_KEY
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_GITHUB_APP_SLUG
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
